<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOON FPS: v9.7 FIXED SCALING</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a0500; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #gui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.95); border: 4px solid black; padding: 15px; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid black; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        #reload-indicator { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #ff4757; display: none; text-shadow: 2px 2px 0px black; font-size: 24px; }
        #health-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 25px; border: 4px solid black; background: #333; z-index: 10; }
        #health-bar { width: 100%; height: 100%; background: #2ed573; transition: width 0.2s; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,69,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; text-shadow: 5px 5px 0px black; }
        #speed-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; background: radial-gradient(circle, transparent 25%, rgba(255,255,255,0.4) 100%); mask-image: repeating-conic-gradient(from 0deg, black 0deg 2deg, transparent 2deg 15deg); -webkit-mask-image: repeating-conic-gradient(from 0deg, black 0deg 2deg, transparent 2deg 15deg); transition: opacity 0.1s; }
    </style>
</head>
<body>
    <div id="death-screen"><h1>INCINERATED</h1><p>RESPAWNING...</p></div>
    <div id="reload-indicator">RELOADING ROCKET...</div>
    <div id="speed-lines"></div>
    <div id="crosshair"></div>
    <div id="health-container"><div id="health-bar"></div></div>
    <div id="gui">
        <div style="font-weight: bold;">TOON FPS v9.7 RAW</div>
        <div id="my-id" style="font-size: 10px; color: #666;">ID: Connecting...</div>
        <button onclick="copyInvite()" style="background:#ff4757; color:white; border:2px solid black; cursor:pointer; width:100%; margin-top:10px; font-weight:bold; padding:5px;">COPY INVITE</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "peerjs": "https://esm.sh/peerjs@1.5.2"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { OutlineEffect } from 'three/addons/effects/OutlineEffect.js';
        import { Peer } from 'peerjs';

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playSynth = {
            fire: () => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(140, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.2);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.25);
            },
            explosion: () => {
                const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
                const d = b.getChannelData(0); for(let i=0; i<b.length; i++) d[i] = Math.random()*2-1;
                const s = audioCtx.createBufferSource(); s.buffer = b;
                const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(350, audioCtx.currentTime);
                const g = audioCtx.createGain(); g.gain.setValueAtTime(0.6, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                s.connect(f); f.connect(g); g.connect(audioCtx.destination); s.start();
            }
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a0800);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        const camGroup = new THREE.Group(); camGroup.add(camera); scene.add(camGroup);
        camGroup.position.set(0, 10, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const effect = new OutlineEffect(renderer, { defaultThickness: 0.005 });
        const controls = new PointerLockControls(camera, document.body);

        // Aspect Ratio Fix
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- LIGHTING ---
        const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.3); scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffffff, 0.6); sun.position.set(10, 50, 10); scene.add(sun);
        const rMat = (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.6, metalness: 0.1 });

        // --- THE MAP ---
        const platforms = [], ladders = [], bubbles = [];
        const lavaFloor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshBasicMaterial({ color: 0xff3300 }));
        lavaFloor.rotation.x = -Math.PI/2; lavaFloor.position.y = -5.5; scene.add(lavaFloor);

        for(let i=0; i<100; i++) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(Math.random()*0.8+0.4, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff6600 }));
            b.position.set(Math.random()*400-200, -5.7, Math.random()*400-200);
            b.userData = { speed: Math.random()*0.02+0.01, phase: Math.random()*Math.PI*2 };
            scene.add(b); bubbles.push(b);
        }

        const createPlat = (w,h,d,x,y,z, col=0x444444) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), rMat(col));
            m.position.set(x,y,z); scene.add(m); platforms.push(m);
        };

        createPlat(20, 1, 20, 0, 4, 0, 0x333333); // Hub
        createPlat(12, 1, 12, 40, 18, 40, 0x222222); 
        createPlat(8, 1, 8, 80, 25, 80, 0x111111); 
        const rope = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 57), rMat(0xffffff));
        rope.position.set(60, 21.5, 60); rope.rotation.y = Math.PI/4; scene.add(rope); platforms.push(rope);

        for(let i=0; i<20; i++) {
            createPlat(Math.random()*12+5, 1, Math.random()*12+5, (Math.random()-0.5)*150, Math.random()*30+5, (Math.random()-0.5)*150, Math.random()*0xffffff);
        }

        const createLadder = (x, z, h) => {
            const g = new THREE.Group();
            for(let i=0; i<h; i+=0.5){
                const s = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 0.2), rMat(0x999999));
                s.position.y = i; g.add(s);
            }
            g.position.set(x, 0, z); scene.add(g); ladders.push({x, z, h});
        };
        createLadder(40, 34, 18.5);

        // --- RPG ---
        function createRPG() {
            const g = new THREE.Group();
            const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.2), rMat(0x1a1a1a)); tube.rotation.x = Math.PI/2;
            const wood = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5), rMat(0x5d3a1a)); wood.rotation.x = Math.PI/2; wood.position.z = 0.15;
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.08), rMat(0x111111)); hand.position.set(0,-0.15,-0.2);
            const rG = new THREE.Group();
            const rT = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.35, 12), rMat(0x3e4a21)); rT.rotation.x = -Math.PI/2; rT.position.z = -0.85;
            const rB = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), rMat(0x4d5d2a)); rB.rotation.x = Math.PI/2; rB.position.z = -0.6;
            rG.add(rT, rB); g.add(tube, wood, hand, rG); return { g, rocket: rG };
        }
        const myRPG = createRPG(); myRPG.g.position.set(0.4,-0.4,-0.7); camera.add(myRPG.g);

        // --- PHYSICS ---
        let health = 100, isDead = false, isReloading = false, vel = new THREE.Vector3(), shake = 0;
        let move = { f:0, b:0, l:0, r:0, sprint: false, crouch: false };
        let proj = [], explosions = [];

        function doExplode(pos) {
            playSynth.explosion();
            const cluster = new THREE.Group(); cluster.position.copy(pos);
            for(let i=0; i<12; i++) {
                const s = new THREE.Mesh(new THREE.SphereGeometry(1.0, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true }));
                s.position.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5); cluster.add(s);
            }
            scene.add(cluster); explosions.push({ m: cluster, t: 0 });
            const d = camGroup.position.distanceTo(pos);
            if(d < 15) {
                shake = Math.max(shake, (15 - d) * 0.35);
                const p = (15-d); const dir = new THREE.Vector3().subVectors(camGroup.position, pos).normalize();
                vel.x += dir.x * p * 8; vel.z += dir.z * p * 8; vel.y += p * 5.5;
            }
        }

        function fire() {
            if(isDead || !controls.isLocked || isReloading) return;
            playSynth.fire(); isReloading = true; myRPG.rocket.visible = false;
            document.getElementById('reload-indicator').style.display='block';
            const r = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.4), rMat(0x4d5d2a));
            const worldPos = new THREE.Vector3(); camera.getWorldPosition(worldPos);
            const worldQuat = new THREE.Quaternion(); camera.getWorldQuaternion(worldQuat);
            r.position.copy(worldPos); r.quaternion.copy(worldQuat);
            const d = new THREE.Vector3(0,0,-1).applyQuaternion(worldQuat);
            r.userData = { v: d.multiplyScalar(1.5), life: 300, g: 0.006 };
            scene.add(r); proj.push(r);
            setTimeout(() => { myRPG.rocket.visible=true; isReloading=false; document.getElementById('reload-indicator').style.display='none'; }, 2500);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = Date.now() * 0.005;

            bubbles.forEach(b => {
                b.position.y += b.userData.speed;
                b.scale.setScalar(1 + Math.sin(time + b.userData.phase)*0.3);
                if(b.position.y > -4.5) b.position.y = -6.0;
            });

            if(shake > 0) {
                camera.position.x = (Math.random()-0.5) * shake;
                camera.position.y = (Math.random()-0.5) * shake;
                shake *= 0.9;
            } else { camera.position.set(0,0,0); }

            proj.forEach((p, i) => {
                p.userData.v.y -= p.userData.g; p.position.add(p.userData.v);
                p.lookAt(p.position.clone().add(p.userData.v)); p.rotateX(Math.PI/2);
                platforms.forEach(pl => { if(new THREE.Box3().setFromObject(pl).containsPoint(p.position)) p.userData.life = 0; });
                if(p.position.y < -5.0 || p.userData.life <= 0) { doExplode(p.position); scene.remove(p); proj.splice(i,1); }
            });

            explosions.forEach((ex,i) => {
                ex.t += dt; ex.m.scale.multiplyScalar(1.1);
                ex.m.children.forEach(c => c.material.opacity = 1 - (ex.t/0.6));
                if(ex.t > 0.6) { scene.remove(ex.m); explosions.splice(i,1); }
            });

            if(controls.isLocked && !isDead) {
                vel.y -= 26 * dt;
                const spd = (move.crouch ? 0.08 : (move.sprint ? 0.35 : 0.18)) * 60 * dt;
                
                // FIXED MOVEMENT LOGIC
                const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
                
                if(move.f) camGroup.position.addScaledVector(forward, spd);
                if(move.b) camGroup.position.addScaledVector(forward, -spd);
                if(move.l) camGroup.position.addScaledVector(right, -spd);
                if(move.r) camGroup.position.addScaledVector(right, spd);

                document.getElementById('speed-lines').style.opacity = (move.sprint && (move.f||move.b)) ? "1" : "0";
                camGroup.position.y += vel.y * dt; camGroup.position.x += vel.x * dt; camGroup.position.z += vel.z * dt;
                
                if(camGroup.position.y < -4.5) { isDead=true; document.getElementById('death-screen').style.display='flex'; setTimeout(()=>location.reload(), 1500); }
                
                platforms.forEach(p => {
                    const b = new THREE.Box3().setFromObject(p);
                    if(b.containsPoint(new THREE.Vector3(camGroup.position.x, camGroup.position.y-(move.crouch?1:1.7), camGroup.position.z))) {
                        if(vel.y < 0) { camGroup.position.y = p.position.y + (p.geometry.parameters.height/2) + (move.crouch?1:1.7); vel.y = 0; }
                    }
                });
                ladders.forEach(l => { if(new THREE.Vector2(camGroup.position.x, camGroup.position.z).distanceTo(new THREE.Vector2(l.x, l.z)) < 1.6 && move.f) vel.y = 7.5; });
                vel.x *= 0.96; vel.z *= 0.96;
            }
            effect.render(scene, camera);
        }

        window.onkeydown = (e) => {
            if(e.code==='KeyW') move.f=1; if(e.code==='KeyS') move.b=1; if(e.code==='KeyA') move.l=1; if(e.code==='KeyD') move.r=1;
            if(e.code==='ShiftLeft') move.sprint=true; if(e.code==='KeyC') move.crouch=true;
            if(e.code==='Space' && !move.crouch) { if(Math.abs(vel.y) < 0.1) vel.y = 11; }
        };
        window.onkeyup = (e) => {
            if(e.code==='KeyW') move.f=0; if(e.code==='KeyS') move.b=0; if(e.code==='KeyA') move.l=0; if(e.code==='KeyD') move.r=0;
            if(e.code==='ShiftLeft') move.sprint=false; if(e.code==='KeyC') move.crouch=false;
        };
        document.addEventListener('mousedown', () => { if(!controls.isLocked) { audioCtx.resume(); controls.lock(); } else fire(); });
        animate();
    </script>
</body>
</html>
