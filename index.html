<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOON FPS: v9.0 MASTER</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a0500; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #gui { position: absolute; top: 20px; left: 20px; z-index: 10; background: white; border: 4px solid black; padding: 15px; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid black; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        #reload-indicator { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #ff4757; display: none; text-shadow: 2px 2px 0px black; font-size: 20px; }
        #health-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 25px; border: 4px solid black; background: #333; z-index: 10; }
        #health-bar { width: 100%; height: 100%; background: #2ed573; transition: width 0.2s; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,69,0,0.6); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; text-shadow: 4px 4px 0px black; }
        #speed-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; background: radial-gradient(circle, transparent 25%, rgba(255,255,255,0.7) 100%); mask-image: repeating-conic-gradient(from 0deg, black 0deg 2deg, transparent 2deg 15deg); -webkit-mask-image: repeating-conic-gradient(from 0deg, black 0deg 2deg, transparent 2deg 15deg); transition: opacity 0.1s; }
        button { background: #ff4757; color: white; border: 2px solid black; padding: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="death-screen"><h1>MOLTEN DEFEAT</h1><p>RESPAWNING...</p></div>
    <div id="reload-indicator">RELOADING...</div>
    <div id="speed-lines"></div>
    <div id="crosshair"></div>
    <div id="health-container"><div id="health-bar"></div></div>
    <div id="gui">
        <div style="font-weight: bold;">TOON FPS v9.0</div>
        <div id="my-id" style="font-size: 10px; color: #666;">ID: Connecting...</div>
        <button id="copy-link">SHARE INVITE</button>
        <div style="font-size: 9px; margin-top: 5px;">WASD: Move | SPACE: Jump | C: Crouch | SHIFT: Sprint</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "peerjs": "https://esm.sh/peerjs@1.5.2"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { OutlineEffect } from 'three/addons/effects/OutlineEffect.js';
        import { Peer } from 'peerjs';

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playSynth = {
            fire: () => {
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                g.gain.setValueAtTime(0.4, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            },
            explosion: () => {
                const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
                const d = b.getChannelData(0); for(let i=0; i<b.length; i++) d[i] = Math.random()*2-1;
                const s = audioCtx.createBufferSource(); s.buffer = b;
                const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(500, audioCtx.currentTime);
                const g = audioCtx.createGain(); g.gain.setValueAtTime(0.6, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                s.connect(f); f.connect(g); g.connect(audioCtx.destination); s.start();
            },
            jump: () => {
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(120, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime+0.1);
                g.gain.setValueAtTime(0.15, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.2);
                osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.2);
            }
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0500);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const effect = new OutlineEffect(renderer, { defaultThickness: 0.004 });
        const controls = new PointerLockControls(camera, document.body);
        const toonMat = (color) => new THREE.MeshToonMaterial({ color });

        // --- MAP & LAVA ---
        const lavaMat = new THREE.MeshBasicMaterial({ color: 0xff4500 });
        const lava = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), lavaMat);
        lava.rotation.x = -Math.PI/2; lava.position.y = -3; scene.add(lava);

        const platforms = [], ladders = [];
        const createPlat = (w,h,d,x,y,z) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), toonMat(0x444444));
            m.position.set(x,y,z); scene.add(m); platforms.push(m);
        };
        createPlat(12, 1, 12, 0, 4, 0); // Center
        createPlat(8, 1, 8, 18, 9, 18); // High Point
        createPlat(8, 1, 8, -18, 7, -18); // Mid Point
        
        // The Bridge
        createPlat(18, 0.2, 3, 10, 4, 0); 
        // The Tightrope
        const rope = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 25), toonMat(0xdddddd));
        rope.position.set(-10, 7, -10); rope.rotation.y = Math.PI/4; scene.add(rope); platforms.push(rope);

        // Ladder
        const createLad = (x,z,h) => {
            const g = new THREE.Group();
            for(let i=0; i<h; i+=0.5) {
                const s = new THREE.Mesh(new THREE.BoxGeometry(1, 0.08, 0.1), toonMat(0xaaaaaa));
                s.position.y = i; g.add(s);
            }
            g.position.set(x, 0, z); scene.add(g); ladders.push({x,z,h});
        };
        createLad(6, 6, 9.5);

        // --- DETAILED RPG ---
        function createRPG() {
            const g = new THREE.Group();
            const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.2), toonMat(0x222222)); tube.rotation.x = Math.PI/2;
            const shield = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5), toonMat(0x8B4513)); shield.rotation.x = Math.PI/2; shield.position.z = 0.15;
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.08), toonMat(0x333333)); handle.position.set(0, -0.15, -0.2);
            const rG = new THREE.Group();
            const rTip = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.35, 12), toonMat(0x4b5320)); rTip.rotation.x = -Math.PI/2; rTip.position.z = -0.85;
            const rBody = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), toonMat(0x6b8e23)); rBody.rotation.x = Math.PI/2; rBody.position.z = -0.6;
            rG.add(rTip, rBody); g.add(tube, shield, handle, rG); return { g, rocket: rG };
        }
        const rpg = createRPG(); rpg.g.position.set(0.4, -0.4, -0.7); camera.add(rpg.g); scene.add(camera);

        // --- GAMEPLAY VARS ---
        let health = 100, isDead = false, isReloading = false, vel = new THREE.Vector3();
        let move = { f: 0, b: 0, l: 0, r: 0, sprint: false, crouch: false };
        let proj = [], expl = [];
        const baseH = 1.7, crouchH = 1.0; let targetH = 1.7;

        function doExplode(pos) {
            playSynth.explosion();
            // Glow FX
            const g = new THREE.Mesh(new THREE.SphereGeometry(1.8, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true }));
            g.position.copy(pos); scene.add(g); expl.push({ m: g, t: 0 });
            // Rocket Jump & Damage
            const d = camera.position.distanceTo(pos);
            if(d < 8) {
                const p = (8-d); const dir = new THREE.Vector3().subVectors(camera.position, pos).normalize();
                vel.x += dir.x * p * 9; vel.z += dir.z * p * 9; vel.y += p * 5.5;
                if(d < 3) { health -= 20; updateUI(); }
            }
        }

        function fire() {
            if(isDead || !controls.isLocked || isReloading) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            playSynth.fire(); isReloading = true; rpg.rocket.visible = false;
            document.getElementById('reload-indicator').style.display = 'block';
            
            const r = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.3), toonMat(0x6b8e23));
            r.position.copy(camera.position); r.quaternion.copy(camera.quaternion);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            r.userData = { v: dir.multiplyScalar(1.0), life: 200, grav: 0.005 };
            scene.add(r); proj.push(r);

            setTimeout(() => { 
                rpg.rocket.visible = true; isReloading = false; 
                document.getElementById('reload-indicator').style.display = 'none';
            }, 2500);
        }

        function die() {
            isDead = true; document.getElementById('death-screen').style.display='flex';
            controls.unlock();
            setTimeout(() => {
                isDead = false; health = 100; updateUI();
                camera.position.set(0, 6, 0); vel.set(0,0,0);
                document.getElementById('death-screen').style.display='none';
                controls.lock();
            }, 2000);
        }

        function updateUI() { 
            document.getElementById('health-bar').style.width = health + "%"; 
            if(health <= 0 && !isDead) die();
        }

        // --- NETWORKING (P2P) ---
        const peer = new Peer(); const players = {}, connections = {};
        peer.on('open', id => { document.getElementById('my-id').innerText = "ID: " + id; const j = new URLSearchParams(window.location.search).get('join'); if(j) setup(peer.connect(j)); });
        peer.on('connection', setup);
        function setup(c) {
            c.on('open', () => connections[c.peer] = c);
            c.on('data', d => {
                if(!players[c.peer]) { players[c.peer] = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1), toonMat(0x00ffff)); scene.add(players[c.peer]); }
                players[c.peer].position.set(d.x, d.y-1, d.z);
            });
        }
        document.getElementById('copy-link').onclick = () => { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?join=${peer.id}`); alert("Invite Link Copied!"); };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = Date.now() * 0.004;

            lavaMat.color.setHSL(0.04, 1, 0.4 + Math.sin(time)*0.15); // Lava Pulse

            proj.forEach((p, i) => {
                p.userData.v.y -= p.userData.grav; p.position.add(p.userData.v);
                p.lookAt(p.position.clone().add(p.userData.v)); p.rotateX(Math.PI/2);
                platforms.forEach(plat => { if(new THREE.Box3().setFromObject(plat).containsPoint(p.position)) p.userData.life = 0; });
                if(p.position.y < -2.5 || p.userData.life <= 0) { doExplode(p.position); scene.remove(p); proj.splice(i,1); }
            });

            expl.forEach((ex,i) => {
                ex.t += dt; ex.m.scale.multiplyScalar(1.08);
                ex.m.material.opacity = 1 - (ex.t/0.4);
                if(ex.t > 0.4) { scene.remove(ex.m); expl.splice(i,1); }
            });

            if(controls.isLocked && !isDead) {
                vel.y -= 26 * dt; // Gravity
                targetH = move.crouch ? crouchH : baseH;
                const spd = move.crouch ? 0.07 : (move.sprint ? 0.3 : 0.15);
                
                document.getElementById('speed-lines').style.opacity = (move.sprint && (move.f||move.b)) ? "1" : "0";

                controls.moveRight((move.r - move.l) * spd);
                controls.moveForward((move.f - move.b) * spd);
                camera.position.y += vel.y * dt;
                camera.position.x += vel.x * dt; camera.position.z += vel.z * dt;

                if(camera.position.y < -1.5) die();

                platforms.forEach(p => {
                    const b = new THREE.Box3().setFromObject(p);
                    if(b.containsPoint(new THREE.Vector3(camera.position.x, camera.position.y - targetH, camera.position.z))) {
                        camera.position.y = p.position.y + (p.geometry.parameters.height/2 || 0.1) + targetH;
                        vel.y = 0;
                    }
                });

                ladders.forEach(l => {
                    const d = new THREE.Vector2(camera.position.x, camera.position.z).distanceTo(new THREE.Vector2(l.x, l.z));
                    if(d < 1.1 && move.f) vel.y = 6;
                });

                vel.x *= 0.94; vel.z *= 0.94;
            }

            if(peer.id) Object.values(connections).forEach(c => c.send({x: camera.position.x, y: camera.position.y, z: camera.position.z}));
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            effect.render(scene, camera);
        }

        window.onkeydown = (e) => {
            if(e.code==='KeyW') move.f=1; if(e.code==='KeyS') move.b=1; if(e.code==='KeyA') move.l=1; if(e.code==='KeyD') move.r=1;
            if(e.code==='ShiftLeft') move.sprint=true; if(e.code==='KeyC') move.crouch=true;
            if(e.code==='Space' && !move.crouch) { vel.y = 11; playSynth.jump(); }
        };
        window.onkeyup = (e) => {
            if(e.code==='KeyW') move.f=0; if(e.code==='KeyS') move.b=0; if(e.code==='KeyA') move.l=0; if(e.code==='KeyD') move.r=0;
            if(e.code==='ShiftLeft') move.sprint=false; if(e.code==='KeyC') move.crouch=false;
        };
        document.addEventListener('mousedown', () => { if(!controls.isLocked) controls.lock(); else fire(); });
        animate();
    </script>
</body>
</html>
