<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOON FPS: v7.1 ROUNDED JOINTS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #gui { position: absolute; top: 20px; left: 20px; z-index: 10; background: white; border: 4px solid black; padding: 15px; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid black; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        #health-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 25px; border: 4px solid black; background: #333; z-index: 10; }
        #health-bar { width: 100%; height: 100%; background: #2ed573; transition: width 0.2s; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        #speed-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; background: radial-gradient(circle, transparent 25%, rgba(255,255,255,0.6) 100%); mask-image: repeating-conic-gradient(from 0deg, black 0deg 2deg, transparent 2deg 15deg); -webkit-mask-image: repeating-conic-gradient(from 0deg, black 0deg 2deg, transparent 2deg 15deg); transition: opacity 0.15s; }
        button { background: #ff4757; color: white; border: 2px solid black; padding: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="death-screen"><h1>DEFEATED</h1><p>RESPAWNING IN <span id="timer">3</span>...</p></div>
    <div id="speed-lines"></div>
    <div id="crosshair"></div>
    <div id="health-container"><div id="health-bar"></div></div>
    <div id="gui">
        <div style="font-weight: bold;">TOON FPS v7.1</div>
        <div id="my-id" style="font-size: 10px; color: #666;">ID: Connecting...</div>
        <div id="status" style="font-size: 10px; color: #2ed573;">Waiting for players...</div>
        <button id="copy-link">SHARE INVITE</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "peerjs": "https://esm.sh/peerjs@1.5.2"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { OutlineEffect } from 'three/addons/effects/OutlineEffect.js';
        import { Peer } from 'peerjs';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const effect = new OutlineEffect(renderer, { defaultThickness: 0.006 });
        const controls = new PointerLockControls(camera, document.body);
        const toonMat = (color) => new THREE.MeshToonMaterial({ color });

        // World Setup
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), toonMat(0x2ed573));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        for (let i = 0; i < 400; i++) {
            const blade = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 0.4), toonMat(0x26af5b));
            blade.position.set(Math.random()*60-30, 0.2, Math.random()*60-30);
            blade.rotation.y = Math.random()*Math.PI;
            scene.add(blade);
        }
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- FIRST PERSON RPG ---
        const rpgGroup = new THREE.Group();
        const tubeMain = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.2, 12), toonMat(0x333333));
        tubeMain.rotation.x = Math.PI / 2;
        const heatShield = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.45, 12), toonMat(0x8B4513));
        heatShield.rotation.x = Math.PI / 2; heatShield.position.z = 0.1;
        const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.12, 0.2, 12), toonMat(0x333333));
        exhaust.rotation.x = Math.PI / 2; exhaust.position.z = 0.55;
        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.08), toonMat(0x222222));
        grip.position.set(0, -0.15, -0.1);
        const loadedRocket = new THREE.Group();
        const rHead = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.3, 12), toonMat(0x4b6332));
        rHead.rotation.x = -Math.PI / 2; rHead.position.z = -0.65;
        const rShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.4, 12), toonMat(0x6b8e23));
        rShaft.rotation.x = Math.PI / 2; rShaft.position.z = -0.45;
        loadedRocket.add(rHead, rShaft);
        rpgGroup.add(tubeMain, heatShield, exhaust, grip, loadedRocket);
        rpgGroup.position.set(0.45, -0.45, -0.7);
        camera.add(rpgGroup);

        const flash = new THREE.PointLight(0xFFD700, 0, 5);
        camera.add(flash);
        scene.add(camera);

        // --- ROUNDED TABS PLAYER MODEL ---
        function createPlayerModel(color) {
            const group = new THREE.Group();
            
            // Rounded Torso
            const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.5, 4, 8), toonMat(color));
            torso.position.y = 1.05;

            // Rounded Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), toonMat(0xeeeeee));
            head.position.y = 1.55;
            const visor = new THREE.Mesh(new THREE.CapsuleGeometry(0.18, 0.1, 4, 8), toonMat(0x111111));
            visor.rotation.z = Math.PI/2;
            visor.position.set(0, 0.05, -0.18);
            head.add(visor);

            // Function to create jointed limb
            const createLimb = (isLeg) => {
                const limbGroup = new THREE.Group();
                const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.25, 4, 8), toonMat(isLeg ? 0x222222 : color));
                upper.position.y = -0.125;
                
                const lowerGroup = new THREE.Group();
                lowerGroup.position.y = -0.25;
                const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.25, 4, 8), toonMat(isLeg ? 0x222222 : color));
                lower.position.y = -0.125;
                
                lowerGroup.add(lower);
                limbGroup.add(upper, lowerGroup);
                return { root: limbGroup, lower: lowerGroup };
            };

            const legL = createLimb(true); legL.root.position.set(-0.15, 0.8, 0);
            const legR = createLimb(true); legR.root.position.set(0.15, 0.8, 0);
            const armL = createLimb(false); armL.root.position.set(-0.35, 1.3, 0);
            const armR = createLimb(false); armR.root.position.set(0.35, 1.3, 0);

            // TP RPG
            const tpRPG = new THREE.Group();
            tpRPG.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.8), toonMat(0x333333)));
            tpRPG.rotation.x = Math.PI/2;
            tpRPG.position.set(0.35, 1.25, -0.3);
            const tpFlash = new THREE.PointLight(0xFFD700, 0, 3);
            tpFlash.position.z = -0.5;
            tpRPG.add(tpFlash);

            group.add(torso, head, legL.root, legR.root, armL.root, armR.root, tpRPG);
            return { group, torso, head, legL, legR, armL, armR, flash: tpFlash };
        }

        // --- STATE & PHYSICS ---
        let health = 100, isDead = false, isReloading = false, vel = new THREE.Vector3(), bobTimer = 0, currentEyeHeight = 1.7;
        camera.position.y = currentEyeHeight;
        let move = { f: false, b: false, l: false, r: false, sprint: false, crouch: false };
        let projectiles = [], explosions = [];
        const speedLinesEl = document.getElementById('speed-lines');

        function fireRPG() {
            if(isDead || !controls.isLocked || isReloading) return;
            isReloading = true; loadedRocket.visible = false; flash.intensity = 15;
            rpgGroup.position.z += 0.25; rpgGroup.rotation.x -= 0.15;

            const rocket = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.4), toonMat(0x6b8e23));
            rocket.position.copy(camera.position); rocket.quaternion.copy(camera.quaternion);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            rocket.userData = { velocity: dir.multiplyScalar(0.75), life: 120 };
            scene.add(rocket); projectiles.push(rocket);
            
            Object.values(connections).forEach(c => { if(c.open) c.send({ type: 'rpc_fire' }); });
            setTimeout(() => { flash.intensity = 0; }, 50);
            
            setTimeout(() => {
                const drop = setInterval(() => {
                    rpgGroup.position.y -= 0.06; rpgGroup.rotation.z += 0.02;
                    if(rpgGroup.position.y < -1.2) {
                        clearInterval(drop); loadedRocket.visible = true; 
                        rpgGroup.position.z = -0.7; rpgGroup.rotation.x = 0; rpgGroup.rotation.z = 0;
                        const rise = setInterval(() => {
                            rpgGroup.position.y += 0.06;
                            if(rpgGroup.position.y >= -0.45) { rpgGroup.position.y = -0.45; clearInterval(rise); isReloading = false; }
                        }, 16);
                    }
                }, 16);
            }, 300);
        }

        function createExplosion(pos) {
            const group = new THREE.Group(); group.position.copy(pos);
            for(let i=0; i<6; i++){
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), toonMat(i % 2 === 0 ? 0xffa502 : 0xffffff));
                b.position.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5);
                group.add(b);
            }
            scene.add(group); explosions.push({ mesh: group, time: 0 });
            if(camera.position.distanceTo(pos) < 5) vel.y += (5 - camera.position.distanceTo(pos)) * 12;
            Object.keys(players).forEach(id => { if(players[id].group.position.distanceTo(pos) < 5) connections[id].send({ type: 'hit', damage: 35 }); });
        }

        // --- NETWORKING ---
        const peer = new Peer(); const players = {}; const connections = {};
        peer.on('open', id => {
            document.getElementById('my-id').innerText = "ID: " + id;
            const urlJoin = new URLSearchParams(window.location.search).get('join');
            if(urlJoin) setupConn(peer.connect(urlJoin));
        });
        peer.on('connection', setupConn);
        function setupConn(c) {
            c.on('open', () => { connections[c.peer] = c; document.getElementById('status').innerText = `Connected: ${Object.keys(connections).length} player(s)`; });
            c.on('data', d => {
                if(d.type === 'hit') { health -= d.damage; if(health<=0 && !isDead) die(); updateUI(); }
                else if(d.type === 'rpc_fire') { if(players[c.peer]) { players[c.peer].flash.intensity = 15; setTimeout(()=>players[c.peer].flash.intensity=0, 50); }}
                else {
                    if(!players[c.peer]) {
                        const pData = createPlayerModel(Math.random()*0xffffff);
                        players[c.peer] = { ...pData, target: new THREE.Vector3(), tRot: 0, anim: 0 };
                        scene.add(players[c.peer].group);
                    }
                    players[c.peer].target.set(d.x, d.y - currentEyeHeight, d.z); 
                    players[c.peer].tRot = d.ry;
                    players[c.peer].moving = d.moving;
                }
            });
        }
        setInterval(() => { 
            const isMoving = move.f || move.b || move.l || move.r;
            Object.values(connections).forEach(c => { 
                if(c.open) c.send({ x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y, moving: isMoving }); 
            }); 
        }, 16);
        document.getElementById('copy-link').onclick = () => { const link = `${window.location.origin}${window.location.pathname}?join=${peer.id}`; navigator.clipboard.writeText(link); alert("Invite Copied!"); };

        // --- HELPERS ---
        function die() { isDead = true; health = 0; updateUI(); document.getElementById('death-screen').style.display = 'flex'; controls.unlock(); let count = 3; const t = setInterval(() => { count--; document.getElementById('timer').innerText = count; if(count<=0) { clearInterval(t); respawn(); } }, 1000); }
        function respawn() { isDead = false; health = 100; updateUI(); document.getElementById('death-screen').style.display = 'none'; camera.position.set(0, currentEyeHeight, 0); controls.lock(); }
        function updateUI() { document.getElementById('health-bar').style.width = health + "%"; }

        // --- LOOP ---
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        document.addEventListener('mousedown', () => { if(!controls.isLocked) controls.lock(); else fireRPG(); });
        document.onkeydown = (e) => {
            if(isDead) return;
            if(e.code==='KeyW') move.f=true; if(e.code==='KeyS') move.b=true;
            if(e.code==='KeyA') move.l=true; if(e.code==='KeyD') move.r=true;
            if(e.code==='ShiftLeft') move.sprint=true; if(e.code==='KeyC') move.crouch=true;
            if(e.code==='Space' && Math.abs(vel.y)<0.1 && !move.crouch) vel.y += 10;
        };
        document.onkeyup = (e) => { if(e.code==='KeyW') move.f=false; if(e.code==='KeyS') move.b=false; if(e.code==='KeyA') move.l=false; if(e.code==='KeyD') move.r=false; if(e.code==='ShiftLeft') move.sprint=false; if(e.code==='KeyC') move.crouch=false; };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            projectiles.forEach((p, i) => { p.position.add(p.userData.velocity); p.userData.life--; if(p.position.y < 0.1 || p.userData.life <= 0) { createExplosion(p.position); scene.remove(p); projectiles.splice(i, 1); } });
            explosions.forEach((ex, i) => { ex.time += delta; ex.mesh.scale.multiplyScalar(1.08); if(ex.time > 0.4) { scene.remove(ex.mesh); explosions.splice(i, 1); } });

            if (controls.isLocked && !isDead) {
                vel.y -= 30 * delta; 
                let speed = move.crouch ? 50 : (move.sprint ? 200 : 110);
                const isMoving = move.f || move.b || move.l || move.r;
                camera.fov = THREE.MathUtils.lerp(camera.fov, (move.sprint && isMoving ? 90 : 75), 8*delta); camera.updateProjectionMatrix();
                speedLinesEl.style.opacity = (move.sprint && isMoving ? "1" : "0");
                const dir = new THREE.Vector3(Number(move.r)-Number(move.l), 0, Number(move.f)-Number(move.b)).normalize();
                controls.moveRight(dir.x * speed * delta * 0.1); controls.moveForward(dir.z * speed * delta * 0.1);
                currentEyeHeight = THREE.MathUtils.lerp(currentEyeHeight, (move.crouch ? 0.9 : 1.7), 10 * delta);
                camera.position.y += vel.y * delta;
                if (camera.position.y <= currentEyeHeight) { camera.position.y = currentEyeHeight; vel.y = 0; }
            }
            
            // JOINTED TABS ANIMATIONS
            for(let id in players) { 
                const p = players[id];
                p.group.position.lerp(p.target, 0.2); 
                p.group.rotation.y = THREE.MathUtils.lerp(p.group.rotation.y, p.tRot, 0.2); 
                
                if(p.moving) {
                    p.anim += delta * 12;
                    const swing = Math.sin(p.anim) * 0.8;
                    const kneeBend = Math.abs(Math.cos(p.anim)) * 0.6;
                    
                    // Legs with knees
                    p.legL.root.rotation.x = swing;
                    p.legL.lower.rotation.x = kneeBend;
                    p.legR.root.rotation.x = -swing;
                    p.legR.lower.rotation.x = kneeBend;
                    
                    // Arms with elbows
                    p.armL.root.rotation.x = -swing * 0.5;
                    p.armL.lower.rotation.x = -0.4;
                    p.armR.root.rotation.x = swing * 0.5;
                    p.armR.lower.rotation.x = -0.4;
                    
                    p.torso.rotation.x = Math.sin(p.anim * 0.5) * 0.2 + 0.1;
                    p.head.rotation.z = Math.sin(p.anim) * 0.1;
                } else {
                    [p.legL, p.legR, p.armL, p.armR].forEach(l => {
                        l.root.rotation.x = THREE.MathUtils.lerp(l.root.rotation.x, 0, 5*delta);
                        l.lower.rotation.x = THREE.MathUtils.lerp(l.lower.rotation.x, 0, 5*delta);
                    });
                    p.torso.rotation.x = THREE.MathUtils.lerp(p.torso.rotation.x, 0, 5*delta);
                    p.head.rotation.z = THREE.MathUtils.lerp(p.head.rotation.z, 0, 5*delta);
                }
            }
            effect.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
